<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Performance Contract Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        h1 {
            color: #ff9900;
        }
        
        input, button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Bitcoin Performance Contract Calculator</h1>
    <label for="contractAmount">Contract Amount (USDT):</label>
    <input type="number" id="contractAmount" placeholder="Enter amount in USDT" />
    <button id="calculateButton">Calculate BTC Amount</button>
    <h2 id="result"></h2>

    <script>
        async function fetchBTCPrice() {
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const data = await response.json();
            return parseFloat(data.price);
        }

        document.getElementById('calculateButton').addEventListener('click', async function () {
            const contractAmount = document.getElementById('contractAmount').value;
            if (!contractAmount) {
                alert('Please enter a contract amount');
                return;
            }
            const btcPrice = await fetchBTCPrice();
            const btcAmount = (contractAmount / btcPrice).toFixed(6);
            document.getElementById('result').innerText = `You will receive ${btcAmount} BTC at the current price of ${btcPrice} USDT/BTC.`;
        });
    </script>
</body>

</html>
